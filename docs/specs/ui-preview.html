<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UI Overhaul — Primitive Preview (throwaway)</title>
<!--
  THROWAWAY Phase-1 artifact for docs/specs/ui-overhaul-audit.md.
  Not wired into the app. Demonstrates the proposed token system + primitives.
  Controls: theme (light / admin-dark), tenant accent (proves nothing is hardcoded
  to one brand), and Direction A ("Operator Calm", recommended) vs B ("Warm SaaS").
  Mirrors how styles.css would map: neutral ramp -> semantic tokens -> components,
  with brand --blue/--blue-dark/--accent/--on-blue injected separately (here: the picker).
-->
<style>
  :root {
    /* ---- neutral ramp (primitives) — cool gray, Direction A ---- */
    --n0:#ffffff; --n50:#f7f8fa; --n100:#eef1f4; --n200:#e2e6ea; --n300:#d0d6dd;
    --n400:#9aa2ab; --n500:#6b7480; --n600:#4d555f; --n700:#39404a; --n800:#23282f;
    --n900:#15181d; --n950:#0c0e11;
    /* ---- state hues ---- */
    --success:#0b8a5a; --success-bg:#e7f5ee; --success-fg:#076b46;
    --warn:#b07d0a;   --warn-bg:#faf1d8;    --warn-fg:#7d5806;
    --danger:#d23123; --danger-bg:#fdeae8;  --danger-fg:#a3251a;
    /* ---- brand (per-tenant; here driven by the accent picker) ---- */
    --blue:#7c3aed; --blue-dark:#5b21b6; --accent:#15181d; --on-blue:#ffffff;
    --brand:var(--blue); --brand-strong:var(--blue-dark);
    /* ---- semantic surfaces (LIGHT) ---- */
    --bg:var(--n50); --surface:var(--n0); --surface-2:var(--n50); --surface-3:var(--n0);
    --border:var(--n200); --border-subtle:var(--n100); --border-strong:var(--n300);
    --fg:var(--n900); --fg-muted:var(--n500); --fg-subtle:var(--n400);
    --ring:color-mix(in srgb, var(--blue) 45%, transparent);
    --hover-fill:color-mix(in srgb, var(--n900) 4%, transparent);
    --overlay:color-mix(in srgb, var(--n950) 50%, transparent);
    /* ---- scales ---- */
    --text-xs:12px; --text-sm:13px; --text-base:15px; --text-lg:18px; --text-xl:22px; --text-2xl:28px; --text-3xl:36px;
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:20px; --space-6:24px; --space-8:32px;
    --radius-sm:6px; --radius:10px; --radius-lg:14px; --radius-pill:999px;
    --shadow-sm:0 1px 2px rgba(13,18,28,.06);
    --shadow:0 4px 12px rgba(13,18,28,.08);
    --shadow-lg:0 12px 32px rgba(13,18,28,.14);
    --elev:var(--border); /* Direction A: hairline borders carry separation */
    --card-shadow:none;
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Geist,Roboto,Helvetica,Arial,sans-serif;
    --font-mono:"Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  /* ---- admin dark: re-point ramp + a few semantics; brand stays ---- */
  .pane[data-theme="dark"]{
    --n0:#15181d; --n50:#1b1f25; --n100:#23282f; --n200:#2b313a; --n300:#3a414c;
    --n400:#7b828d; --n500:#a7aeb8; --n600:#c4cad2; --n700:#dde1e6; --n800:#eef1f4; --n900:#f5f7f9; --n950:#fafbfc;
    --bg:#0c0e11; --surface:#15181d; --surface-2:#1b1f25; --surface-3:#23282f;
    --border:#2b313a; --border-subtle:#23282f; --border-strong:#3a414c;
    --fg:#f3f5f7; --fg-muted:#a7aeb8; --fg-subtle:#7b828d;
    --success-bg:color-mix(in srgb,var(--success) 22%, #15181d);
    --warn-bg:color-mix(in srgb,var(--warn) 22%, #15181d);
    --danger-bg:color-mix(in srgb,var(--danger) 24%, #15181d);
    --hover-fill:color-mix(in srgb, #ffffff 6%, transparent);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow:0 6px 18px rgba(0,0,0,.45); --shadow-lg:0 16px 40px rgba(0,0,0,.55);
  }
  /* ---- Direction B overrides: softer, rounder, shadow-led ---- */
  body[data-dir="B"]{
    --radius-sm:10px; --radius:16px; --radius-lg:22px;
    --card-shadow:var(--shadow); --border:transparent; --border-subtle:transparent;
    --bg:#faf8f5; --surface:#ffffff;
  }
  body[data-dir="B"] .pane[data-theme="dark"]{ --bg:#100f0e; --surface:#1a1816; }

  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font-sans);background:#e8eaed;color:#111;
       font-size:var(--text-base);-webkit-font-smoothing:antialiased}
  .toolbar{position:sticky;top:0;z-index:10;display:flex;flex-wrap:wrap;gap:16px;align-items:center;
           padding:12px 20px;background:#101317;color:#fff;border-bottom:1px solid #2b313a}
  .toolbar h1{font-size:14px;margin:0 12px 0 0;font-weight:600;letter-spacing:.2px}
  .toolbar label{font-size:12px;color:#aab;display:flex;gap:6px;align-items:center}
  .toolbar input[type=color]{width:32px;height:24px;border:none;background:none;padding:0;border-radius:6px}
  .toolbar .seg{display:inline-flex;border:1px solid #333a44;border-radius:8px;overflow:hidden}
  .toolbar .seg button{background:#1a1f26;color:#cdd3da;border:0;padding:5px 12px;font-size:12px;cursor:pointer}
  .toolbar .seg button[aria-pressed=true]{background:var(--blue);color:#fff}
  .grid{display:grid;grid-template-columns:1fr;gap:0}
  @media(min-width:1024px){.grid{grid-template-columns:1fr 1fr}}
  .pane{background:var(--bg);color:var(--fg);padding:28px;min-height:60vh}
  .pane h2{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.12em;color:var(--fg-subtle);
           margin:0 0 16px;font-weight:600}
  .sect{margin-bottom:30px}
  .sect > h3{font-size:var(--text-sm);color:var(--fg-muted);margin:0 0 10px;font-weight:600}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}

  /* card */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
        box-shadow:var(--card-shadow);padding:var(--space-5)}
  .card + .card{margin-top:12px}
  .display{font-size:var(--text-2xl);font-weight:680;letter-spacing:-.02em;margin:0 0 4px}
  .muted{color:var(--fg-muted)} .subtle{color:var(--fg-subtle);font-size:var(--text-sm)}
  .num{font-family:var(--font-mono);font-variant-numeric:tabular-nums}

  /* buttons */
  .btn{font:inherit;font-size:var(--text-sm);font-weight:560;border-radius:var(--radius-sm);
       padding:9px 14px;min-height:40px;border:1px solid transparent;cursor:pointer;display:inline-flex;
       align-items:center;gap:8px;transition:background .16s,border-color .16s,transform .04s}
  .btn:active{transform:translateY(.5px)}
  .btn:focus-visible{outline:none;box-shadow:0 0 0 3px var(--ring)}
  .btn--primary{background:var(--blue);color:var(--on-blue)}
  .btn--primary:hover{background:var(--blue-dark)}
  .btn--secondary{background:var(--surface);color:var(--fg);border-color:var(--border-strong)}
  .btn--secondary:hover{background:var(--hover-fill)}
  .btn--ghost{background:transparent;color:var(--fg-muted)} .btn--ghost:hover{background:var(--hover-fill);color:var(--fg)}
  .btn--danger{background:var(--danger);color:#fff}
  .btn[disabled]{opacity:.5;cursor:not-allowed}

  /* inputs */
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .field label{font-size:var(--text-sm);color:var(--fg-muted);font-weight:540}
  .input,.select,.textarea{font:inherit;font-size:var(--text-base);width:100%;background:var(--surface);
    color:var(--fg);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:10px 12px;min-height:42px}
  .input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--ring)}
  .input::placeholder{color:var(--fg-subtle)}

  /* tabs */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border)}
  .tab{background:none;border:0;font:inherit;font-size:var(--text-sm);font-weight:540;color:var(--fg-muted);
       padding:10px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
  .tab[aria-selected=true]{color:var(--fg);border-bottom-color:var(--blue)}

  /* badges */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:var(--text-xs);font-weight:600;
         padding:3px 9px;border-radius:var(--radius-pill);line-height:1.5}
  .badge--neutral{background:var(--surface-2);color:var(--fg-muted);border:1px solid var(--border)}
  .badge--success{background:var(--success-bg);color:var(--success-fg)}
  .badge--warn{background:var(--warn-bg);color:var(--warn-fg)}
  .badge--danger{background:var(--danger-bg);color:var(--danger-fg)}
  .badge--accent{background:color-mix(in srgb,var(--blue) 14%,transparent);color:var(--blue-dark)}
  .pane[data-theme="dark"] .badge--accent{color:color-mix(in srgb,var(--blue) 60%,#fff)}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:var(--text-sm)}
  th{text-align:left;color:var(--fg-subtle);font-weight:600;font-size:var(--text-xs);text-transform:uppercase;
     letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--border)}
  td{padding:11px 10px;border-bottom:1px solid var(--border-subtle)}
  tr:hover td{background:var(--hover-fill)}

  /* toast */
  .toast{display:flex;gap:10px;align-items:center;background:var(--surface-3);border:1px solid var(--border);
         border-left:3px solid var(--success);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);max-width:360px}
  .toast--err{border-left-color:var(--danger)}

  /* skeleton + empty */
  .skel{background:linear-gradient(90deg,var(--surface-2) 25%,var(--border-subtle) 37%,var(--surface-2) 63%);
        background-size:400% 100%;animation:sh 1.4s ease infinite;border-radius:6px;height:14px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  @media(prefers-reduced-motion:reduce){.skel{animation:none}}
  .empty{text-align:center;border:1px dashed var(--border-strong);border-radius:var(--radius);
         padding:28px;color:var(--fg-muted)}
  .empty .dot{width:36px;height:36px;border-radius:50%;background:var(--surface-2);margin:0 auto 10px;
              display:grid;place-items:center;color:var(--fg-subtle)}
  .swatches{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
  .swatches span{flex:1;height:34px}
</style>
</head>
<body data-dir="A">
  <div class="toolbar">
    <h1>UI Overhaul · primitive preview</h1>
    <label>Direction
      <span class="seg" id="dir">
        <button data-dir="A" aria-pressed="true">A · Operator Calm</button>
        <button data-dir="B" aria-pressed="false">B · Warm SaaS</button>
      </span>
    </label>
    <label>Tenant accent <input type="color" id="accent" value="#7c3aed" /></label>
    <span class="subtle" style="color:#8b93a0">↑ change accent — nothing is hardcoded to one brand</span>
  </div>

  <div class="grid">
    <section class="pane" data-theme="light" id="paneLight"></section>
    <section class="pane" data-theme="dark"  id="paneDark"></section>
  </div>

<script>
  const gallery = (label) => `
    <h2>${label}</h2>

    <div class="sect"><h3>Type & metrics</h3>
      <div class="card">
        <p class="display">Pipeline overview</p>
        <p class="muted" style="margin:0 0 14px">Calm hierarchy on Geist; numbers in mono.</p>
        <div class="row" style="gap:28px">
          <div><div class="subtle">Leads</div><div class="num" style="font-size:var(--text-2xl);font-weight:680">1,284</div></div>
          <div><div class="subtle">Booked</div><div class="num" style="font-size:var(--text-2xl);font-weight:680">37</div></div>
          <div><div class="subtle">MRR</div><div class="num" style="font-size:var(--text-2xl);font-weight:680">$48,210</div></div>
        </div>
      </div>
    </div>

    <div class="sect"><h3>Buttons</h3>
      <div class="row">
        <button class="btn btn--primary">Primary</button>
        <button class="btn btn--secondary">Secondary</button>
        <button class="btn btn--ghost">Ghost</button>
        <button class="btn btn--danger">Delete</button>
        <button class="btn btn--primary" disabled>Disabled</button>
        <button class="btn btn--secondary"><span class="skel" style="width:14px;height:14px;border-radius:50%"></span> Loading…</button>
      </div>
    </div>

    <div class="sect"><h3>Inputs</h3>
      <div class="card">
        <div class="field"><label>Lead name</label><input class="input" placeholder="Acme Co." /></div>
        <div class="field"><label>Pipeline status</label>
          <select class="select"><option>New</option><option>Contacted</option><option>Qualified</option></select></div>
        <div class="field"><label>Notes</label><textarea class="textarea" rows="2" placeholder="Add a note…"></textarea></div>
        <button class="btn btn--primary">Save</button>
      </div>
    </div>

    <div class="sect"><h3>Tabs</h3>
      <div class="tabs">
        <button class="tab" aria-selected="true">Dashboard</button>
        <button class="tab" aria-selected="false">Pipeline</button>
        <button class="tab" aria-selected="false">Outreach</button>
        <button class="tab" aria-selected="false">Calls</button>
      </div>
    </div>

    <div class="sect"><h3>Badges</h3>
      <div class="row">
        <span class="badge badge--neutral">Draft</span>
        <span class="badge badge--success">● Qualified</span>
        <span class="badge badge--warn">Pending</span>
        <span class="badge badge--danger">Failed</span>
        <span class="badge badge--accent">Featured</span>
      </div>
    </div>

    <div class="sect"><h3>Table</h3>
      <div class="card" style="padding:6px 8px">
        <table>
          <thead><tr><th>Lead</th><th>Status</th><th>Owner</th><th style="text-align:right">Value</th></tr></thead>
          <tbody>
            <tr><td>Acme Co.</td><td><span class="badge badge--success">Qualified</span></td><td>Dana</td><td class="num" style="text-align:right">$12,000</td></tr>
            <tr><td>Globex</td><td><span class="badge badge--warn">Pending</span></td><td>Lee</td><td class="num" style="text-align:right">$4,500</td></tr>
            <tr><td>Initech</td><td><span class="badge badge--neutral">New</span></td><td>—</td><td class="num" style="text-align:right">$0</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="sect"><h3>Toast · empty · loading</h3>
      <div class="row" style="align-items:stretch">
        <div class="toast">✓ Lead saved.<button class="btn btn--ghost" style="min-height:auto;padding:2px 6px;margin-left:auto">Dismiss</button></div>
        <div class="toast toast--err">⚠ Could not send. <button class="btn btn--ghost" style="min-height:auto;padding:2px 6px">Retry</button></div>
      </div>
      <div class="row" style="margin-top:12px;align-items:stretch">
        <div class="empty" style="flex:1;min-width:200px"><div class="dot">∅</div>No calls yet<div class="subtle">Logged calls appear here.</div></div>
        <div class="card" style="flex:1;min-width:200px">
          <div class="skel" style="width:60%"></div><div class="skel" style="width:90%;margin-top:10px"></div>
          <div class="skel" style="width:75%;margin-top:10px"></div>
        </div>
      </div>
    </div>

    <div class="sect"><h3>Accent + neutral ramp</h3>
      <div class="swatches" style="margin-bottom:8px">
        <span style="background:var(--blue)"></span><span style="background:var(--blue-dark)"></span>
        <span style="background:var(--success)"></span><span style="background:var(--warn)"></span><span style="background:var(--danger)"></span>
      </div>
      <div class="swatches">
        <span style="background:var(--n0)"></span><span style="background:var(--n100)"></span><span style="background:var(--n200)"></span>
        <span style="background:var(--n300)"></span><span style="background:var(--n400)"></span><span style="background:var(--n500)"></span>
        <span style="background:var(--n700)"></span><span style="background:var(--n900)"></span>
      </div>
    </div>
  `;
  document.getElementById('paneLight').innerHTML = gallery('Light · funnel + admin');
  document.getElementById('paneDark').innerHTML  = gallery('Admin dark · .v2-admin-shell[data-theme=dark]');

  // accent picker -> drives the brand tokens (mimics lib/branding.js inline vars)
  const shade = (hex,p)=>{const n=parseInt(hex.slice(1),16);let r=n>>16,g=(n>>8)&255,b=n&255;
    r=Math.round(r*(1-p));g=Math.round(g*(1-p));b=Math.round(b*(1-p));
    return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')};
  const lum = (hex)=>{const n=parseInt(hex.slice(1),16);const r=(n>>16)/255,g=((n>>8)&255)/255,b=(n&255)/255;
    return 0.2126*r+0.7152*g+0.0722*b};
  function setAccent(hex){
    document.documentElement.style.setProperty('--blue',hex);
    document.documentElement.style.setProperty('--blue-dark',shade(hex,.22));
    document.documentElement.style.setProperty('--on-blue', lum(hex)>0.6 ? '#15181d':'#ffffff');
  }
  document.getElementById('accent').addEventListener('input',e=>setAccent(e.target.value));
  setAccent('#7c3aed');

  // direction toggle
  document.getElementById('dir').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b) return;
    document.body.dataset.dir=b.dataset.dir;
    [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed', x===b));
  });
</script>
</body>
</html>
