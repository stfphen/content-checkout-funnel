services:
  content-funnel:
    build: .
    container_name: content-checkout-funnel
    restart: unless-stopped
    networks:
      - traefik-public
    ports:
      - "127.0.0.1:8088:80"
    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik-public"
      traefik.http.routers.dgtlmag.rule: "Host(`dgtlmag.com`) || Host(`www.dgtlmag.com`)"
      traefik.http.routers.dgtlmag.entrypoints: "websecure"
      traefik.http.routers.dgtlmag.tls.certresolver: "letsencrypt"
      traefik.http.services.dgtlmag.loadbalancer.server.port: "80"

networks:
  traefik-public:
    external: true
